apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingressive-cloud-web
  labels:
    app: ingressive-cloud-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingressive-cloud-web
  template:
    metadata:
      labels:
        app: ingressive-cloud-web
    spec:
      containers:
      - name: web
        # Replace with your actual image path, e.g., ghcr.io/<user>/<repo>:latest
        image: ghcr.io/ingressive-cloud/www.ingressive.cloud:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ingressive-cloud-web
spec:
  selector:
    app: ingressive-cloud-web
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingressive-cloud-web
  annotations:
    # Example annotation for nginx ingress controller
    kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: ingressive.cloud
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ingressive-cloud-web
            port:
              number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingressive-cloud-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingressive-cloud-web
  minReplicas: 1
  maxReplicas: 12
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 75
