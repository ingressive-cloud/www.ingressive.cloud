# Number of pod replicas
replicaCount: 1

image:
  repository: ghcr.io/ingressive-cloud/www.ingressive.cloud
  pullPolicy: Always
  tag: "latest"

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  name: ""

podAnnotations: {}

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

service:
  type: ClusterIP
  port: 8080

httpRoute:
  enabled: true
  gatewayName: main
  gatewayNamespace: infra
  # sectionName must match the HTTPS listener name on the shared Gateway
  sectionName: https-ingressive-cloud

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 12
  targetCPUUtilizationPercentage: 75

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
