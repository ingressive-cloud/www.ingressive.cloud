<header>
    <a href="/" class="logo">
        <img src="/static/icon.png" alt="Ingressive logo" class="logo-icon">
        ingressive.cloud
    </a>
    <nav>
        <!-- Search widget -->
        <div class="header-search" id="header-search">
            <button class="search-trigger" id="search-trigger" aria-label="Search docs" aria-expanded="false" aria-controls="search-box">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
            <div class="search-box" id="search-box" role="search" aria-hidden="true">
                <input
                    type="search"
                    id="search-input"
                    class="search-input"
                    placeholder="Search docs…"
                    autocomplete="off"
                    aria-label="Search docs"
                    aria-autocomplete="list"
                    aria-controls="search-results"
                >
                <button class="search-close" id="search-close" aria-label="Close search">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <ul class="search-results" id="search-results" role="listbox" aria-label="Search results" hidden></ul>
        </div>

        <a href="/docs/">Docs</a>
        <a href="{{ .Site.Params.consoleURL }}" class="login-link">Log In</a>
    </nav>
</header>
