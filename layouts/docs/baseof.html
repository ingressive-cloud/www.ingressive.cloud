<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/docs.css">
    <link rel="stylesheet" href="/search.css">
</head>
<body class="docs-body">
    <canvas id="globe-bg"></canvas>
    {{ partial "header.html" . }}

    <button class="docs-menu-toggle" aria-label="Toggle navigation" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>

    <div class="docs-layout">
        <aside class="docs-sidebar" id="docs-sidebar">
            {{ partial "docs-nav.html" . }}
        </aside>
        <main class="docs-main">
            <article class="docs-article">
                {{ block "main" . }}{{ end }}
            </article>
        </main>
    </div>

    {{ partial "footer.html" . }}

    <script>
        // Sidebar mobile toggle
        const toggle = document.querySelector('.docs-menu-toggle');
        const sidebar = document.getElementById('docs-sidebar');
        toggle.addEventListener('click', () => {
            const open = sidebar.classList.toggle('is-open');
            toggle.setAttribute('aria-expanded', open);
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js"></script>
    <script src="/docs-search.js"></script>
    <script src="/script.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
